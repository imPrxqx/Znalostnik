<div class="container">
  <div class="header">
    <mat-icon>check_circle</mat-icon>
    <h3 i18n>Nastavení správné odpověďi</h3>
  </div>

  <div class="item">
    <h3 class="title" i18n>Obsah odpovědi</h3>
    <mat-form-field appearance="outline">
      <mat-label i18n>Správná odpověď</mat-label>
      <input
        matInput
        [value]="field().value.correct"
        (input)="onInputChange($any($event.target).value)"
      />
    </mat-form-field>
  </div>
</div>
