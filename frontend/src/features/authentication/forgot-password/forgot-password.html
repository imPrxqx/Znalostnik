<mat-card class="auth-card">
  <div class="auth-header">
    <a [routerLink]="['/']"><h2>Znalostník</h2></a>
  </div>

  <h2 class="auth-title" i18n>Zapomenuté heslo</h2>

  <form [formGroup]="forgotForm" (ngSubmit)="onSubmit()">
    <input type="email" autocomplete="username" hidden />

    <mat-form-field appearance="outline">
      <mat-label i18n>Email</mat-label>
      <input matInput formControlName="email" type="email" autocomplete="email" />
      <mat-icon matSuffix>email</mat-icon>
    </mat-form-field>

    <div class="auth-register">
      <a mat-button [routerLink]="['/authentication/register']">
        <mat-icon>person_add</mat-icon>
        <p i18n>Zaregistrovat se</p>
      </a>
    </div>

    <button mat-flat-button type="submit" [disabled]="!forgotForm.valid" i18n>Obnovit heslo</button>
  </form>
</mat-card>
