<h2 mat-dialog-title i18n>Nové cvičení</h2>

<mat-dialog-content>
  <br />
  <p i18n>Zadejte název nového cvičení</p>

  <mat-form-field class="full-width" appearance="outline">
    <mat-label i18n>Název cvičení</mat-label>
    <input matInput [(ngModel)]="name" minlength="1" />
    <mat-icon matSuffix>edit</mat-icon>
  </mat-form-field>
</mat-dialog-content>

<mat-dialog-actions>
  <button mat-button (click)="onNoClick()" i18n>Zrušit</button>

  <button mat-flat-button [disabled]="!name()" [mat-dialog-close]="name()" cdkFocusInitial i18n>
    Vytvořit aktivitu
  </button>
</mat-dialog-actions>
