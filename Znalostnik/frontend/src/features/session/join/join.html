<mat-card class="join-card">
  <div class="join-header">
    <mat-icon class="join-icon">groups</mat-icon>
    <h1 i18n>Připojit se k relaci</h1>
    <p i18n>Zadejte kód relace a svojí přezdívku.</p>
  </div>

  <form [formGroup]="joinForm" (ngSubmit)="onSubmit()">
    <mat-form-field appearance="outline">
      <mat-label i18n>Kód relace</mat-label>
      <input matInput formControlName="code" />
      <mat-icon matSuffix>key</mat-icon>
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label i18n>Vaše přezdívka</mat-label>
      <input matInput formControlName="username" />
      <mat-icon matSuffix>person</mat-icon>
    </mat-form-field>

    <button mat-flat-button type="submit" class="join-submit" [disabled]="!joinForm.valid" i18n>
      Připojit se
    </button>
  </form>
</mat-card>
