<div class="join-container">
  <mat-card class="join-card">
    <div class="join-header">
      <img src="favicon.ico" />
      <a [routerLink]="['/']"><h2>Znalostník</h2></a>
    </div>

    <form [formGroup]="joinForm" (ngSubmit)="onSubmit()">
      <mat-form-field>
        <mat-label i18n>Code</mat-label>
        <input matInput formControlName="code" type="code" />
      </mat-form-field>

      <mat-form-field>
        <mat-label i18n>UserName</mat-label>
        <input matInput formControlName="username" type="username" />
      </mat-form-field>
      <button mat-raised-button type="submit" class="join-submit" [disabled]="!joinForm.valid">
        Připojit se
      </button>
    </form>
  </mat-card>
</div>
