<h2 mat-dialog-title i18n>Nový tým</h2>

<mat-dialog-content>
  <br />

  <p i18n>Zadejte název nového týmu</p>
  <mat-form-field class="full-width" appearance="outline">
    <mat-label i18n>Název týmu</mat-label>
    <mat-icon matSuffix>groups</mat-icon>
    <input matInput [(ngModel)]="name" />
  </mat-form-field>
</mat-dialog-content>

<mat-dialog-actions>
  <button mat-button (click)="onNoClick()" i18n>Zrušit</button>

  <button mat-flat-button [disabled]="!name()" [mat-dialog-close]="name()" cdkFocusInitial i18n>
    Vytvořit tým
  </button>
</mat-dialog-actions>
