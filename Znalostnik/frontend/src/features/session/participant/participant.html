<div class="container">
  <div class="content-router">
    @if(loading()) {
    <div class="loading">
      <mat-spinner></mat-spinner>
      <p i18n>Načítání relace...</p>
    </div>
    } @else { @if(session() !== undefined) { @if(session()!.gameMode === 'potato') {
    <app-hot-potato-participant></app-hot-potato-participant>
    } @if(session()!.gameMode === 'classic') {
    <app-classic-participant></app-classic-participant>
    } @if(session()!.gameMode === 'selfStudy') {
    <app-self-study-participant></app-self-study-participant>
    } } }
  </div>
</div>
