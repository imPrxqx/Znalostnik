@if(loading() === true) {
<div class="container-loading">
  <mat-spinner></mat-spinner>
</div>
} @else {
<div class="participant-container">
  <mat-toolbar-row>
    <app-timer [targetTime]="end()"></app-timer>
  </mat-toolbar-row>

  <div class="task-container">
    @if(task() !== undefined && answer() !== undefined) {
    <app-exercise-task [(answer)]="answer" [task]="task()!"></app-exercise-task>
    }
  </div>

  <mat-toolbar-row class="bottom-toolbar">
    <button mat-mini-fab class="submit-button" (click)="submitAnswer()">
      <mat-icon>publish</mat-icon>
    </button>
  </mat-toolbar-row>
</div>

}
