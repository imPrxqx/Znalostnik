@if(loading() === true) {
<div class="container-loading">
  <mat-spinner></mat-spinner>
</div>
} @else {
<div class="host-container">
  <mat-toolbar-row>
    <app-timer [targetTime]="end()"></app-timer>
  </mat-toolbar-row>

  <div class="task-container">
    <app-exercise-task [task]="task()!"></app-exercise-task>
  </div>

  <mat-toolbar-row class="bottom-toolbar">
    <button mat-mini-fab (click)="previousTask()">
      <mat-icon>arrow_left</mat-icon>
    </button>
    <button mat-mini-fab (click)="nextTask()">
      <mat-icon>arrow_right</mat-icon>
    </button>
  </mat-toolbar-row>
</div>
}
