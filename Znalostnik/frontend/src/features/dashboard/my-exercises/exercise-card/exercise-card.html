<mat-card>
  <mat-card-header>
    <mat-card-title>{{ exercise().title }}</mat-card-title>

    <button mat-mini-fab (click)="createSession()">
      <mat-icon>bolt</mat-icon>
    </button>
  </mat-card-header>

  <mat-card-content>
    <app-slide [task]="task()"></app-slide>
  </mat-card-content>

  <mat-card-actions>
    <button mat-mini-fab (click)="openEditor()">
      <mat-icon>edit</mat-icon>
    </button>
    <p i18n>Aktualizováno: {{ exercise().updatedAt | date:'short' }}</p>

    <button mat-mini-fab (click)="deleteExercise()">
      <mat-icon>delete</mat-icon>
    </button>
  </mat-card-actions>
</mat-card>
