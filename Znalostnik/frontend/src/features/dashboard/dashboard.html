<mat-sidenav-container class="container">
  <mat-sidenav class="sidebar" [mode]="isMobile() ? 'over' : 'side'" [opened]="isOpened()">
    <div class="sidebar-inner">
      <div class="sidebar-top">
        <div class="sidebar-header">
          <img src="favicon.ico" alt="Favicon" />
          <a [routerLink]="['/']">
            <h1 i18n>Znalostník</h1>
          </a>
        </div>

        <mat-nav-list class="sidebar-list">
          <a mat-list-item [routerLink]="['home']" routerLinkActive="active" (click)="close()">
            <mat-icon matListItemIcon>home</mat-icon>
            <p i18n>Úvod</p>
          </a>
          <a
            mat-list-item
            [routerLink]="['my-exercises']"
            routerLinkActive="active"
            (click)="close()"
          >
            <mat-icon matListItemIcon>school</mat-icon>
            <p i18n>Cvičení</p>
          </a>

          <a
            mat-list-item
            [routerLink]="['my-sessions']"
            routerLinkActive="active"
            (click)="close()"
          >
            <mat-icon matListItemIcon>emoji_events</mat-icon>
            <p i18n>Relace</p>
          </a>

          <a
            mat-list-item
            [routerLink]="['my-statistics']"
            routerLinkActive="active"
            (click)="close()"
          >
            <mat-icon matListItemIcon>bar_chart</mat-icon>
            <p i18n>Statistiky</p>
          </a>
        </mat-nav-list>
      </div>

      <div>
        <mat-nav-list class="sidebar-list">
          @if(auth.user()) {
          <a mat-list-item routerLink="/authentication/login" (click)="logout()" (click)="close()">
            <mat-icon matListItemIcon>logout</mat-icon>
            <p i18n>Odhlásit se</p>
          </a>
          } @else {
          <a mat-list-item routerLink="/authentication/login" (click)="close()">
            <mat-icon matListItemIcon>logout</mat-icon>
            <p i18n>Přihlásit se</p>
          </a>
          }

          <a
            mat-list-item
            [routerLink]="['my-settings']"
            routerLinkActive="active"
            (click)="close()"
          >
            <mat-icon matListItemIcon>settings</mat-icon>
            <p i18n>Nastavení</p>
          </a>

          <a mat-list-item [routerLink]="['guide']" routerLinkActive="active" (click)="close()">
            <mat-icon matListItemIcon>menu_book</mat-icon>
            <p i18n>Návod</p>
          </a>
        </mat-nav-list>
      </div>
    </div>
  </mat-sidenav>

  <mat-sidenav-content>
    @if(isMobile()) {
    <mat-toolbar>
      <button mat-icon-button (click)="toggle()">
        <mat-icon>menu</mat-icon>
      </button>
    </mat-toolbar>
    }

    <div class="content-router">
      <router-outlet></router-outlet>
    </div>
  </mat-sidenav-content>
</mat-sidenav-container>
