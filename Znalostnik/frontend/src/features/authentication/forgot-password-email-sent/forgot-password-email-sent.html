<mat-card class="auth-card">
  <div class="auth-header">
    <img src="favicon.ico" alt="Favicon" />
    <a [routerLink]="['/']"><h2>Znalostník</h2></a>
  </div>

  <div>
    <h2 class="auth-title" i18n>Zapomenuté heslo</h2>
    <p i18n>Na váš email jsme odeslali odkaz pro obnovení hesla.</p>
  </div>
  <button mat-flat-button [routerLink]="['/authentication/login']" i18n>Zpět na přihlášení</button>
</mat-card>
